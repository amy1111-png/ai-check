name: Daily Stock Report

# 這是觸發條件
on:
  workflow_dispatch:
  schedule:
    # 台灣時間 09:35 (UTC 01:35)
    - cron: '35 1 * * 1-5'
    # 台灣時間 13:35 (UTC 05:35)
    - cron: '35 5 * * 1-5'

# 這是讓 GitHub 重新抓取設定的小技巧
env:
  REFRESH_TIMER: "2026-03-16-v1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝套件
        run: pip install yfinance requests
      - name: 執行程式
        run: python my_app.py
