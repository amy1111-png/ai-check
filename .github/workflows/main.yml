name: Daily Stock Report

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'
    - cron: '30 5 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝套件
        run: pip install yfinance requests
      - name: 執行程式
        run: python my_app.py
